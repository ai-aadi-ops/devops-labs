services:

  flask-app:
    build: .
    container_name: flask-app

    ports:
      - "5000:5000"

    depends_on:
      - mysql

    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: mysql-db

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: employee_db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
