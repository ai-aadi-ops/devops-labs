version: "3.9"

services:

  flask1:
    build: .
    container_name: flask1
    command: python app1.py

  flask2:
    build: .
    container_name: flask2
    command: python app2.py

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask1
      - flask2
